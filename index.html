<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="description" content="Sanskrit Dictionary App" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      ul.nav {
        display: flex;
        list-style: none;
        position: sticky;
        top: 0;
        padding: 2em 1em;
        background: beige;
        z-index: 99;
        margin-bottom: 2em;
        overflow: auto;
      }

      li {
        margin-right: 20px;
      }

      li:last-child {
        margin-right: 0;
      }

      .danger {
        color: red;
      }

      .long-list {
        min-height: 8000px;
        /* content-visibility: auto; */
        /* contentVisibility2: "auto" }} */
      }

      .simple-img {
        height: 200px;
      }

      .box {
        display: flex;
        width: 10px;
        height: 10px;
      }

      zero-md {
        min-height: 500px;
      }

      .typing {
        font-size: 24px;
        animation: typing 1s infinite;
        width: 50px;
        height: 50px;
        background-color: blue;
        display: inline-block;
        margin: 5px;
      }

      @keyframes typing {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/zero-md@3?register"
    ></script>

    <title>Custom Jsx</title>
  </head>
  <body>
    <!-- for index.js -->
    <div id="root"><!--ssr-outlet--></div>

    <!-- <div id="root-vdom"></div> -->

    <!-- <script type="module" src="./src/vdom-app/index-vdom-19-may.jsx"></script> -->
    <script type="module" src="/src/ssr/entry-client.jsx"></script>
  </body>
</html>
